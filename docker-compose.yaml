version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-timejournal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timejournal}
      POSTGRES_DB: ${POSTGRES_DB:-timejournal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timejournal} -d ${POSTGRES_DB:-timejournal}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend (MT5 via Windows Bridge) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-timejournal}:${POSTGRES_PASSWORD:-timejournal}@postgres:5432/${POSTGRES_DB:-timejournal}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE_ME_USE_RANDOM_32_CHARS}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      XAI_API_KEY: ${XAI_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      # MT5 Bridge (Push Mode) — bridge calls backend, not the other way around
      MT5_BRIDGE_API_KEY: ${MT5_BRIDGE_API_KEY:-changeme_secret_key_123}
      MT5_POLL_INTERVAL: ${MT5_POLL_INTERVAL:-10}
    volumes:
      - backend_data:/app/data
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/health > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into Next.js bundle at build time
        # nginx handles /api/ routing internally — use same domain, no subdomain needed
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://timejournal.site}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://timejournal.site}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # NextAuth runtime env vars
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://timejournal.site}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-CHANGE_ME_USE_RANDOM_32_CHARS}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    build:
      context: ./backend
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    # Ports 80/443 are handled by Coolify's proxy. 
    # Internal routing will use the container's port 80.
    expose:
      - "80"
      - "443"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1/api/health > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_data:
